# AI-Novels Neo4j APOC Configuration
# Enable APOC procedures and functions

# 是否允许自动加载自定义插件
apoc.autoLoad.enabled=true

# 自动加载目录
apoc.import.file.enabled=true
apoc.import.file.use_neo4j_config=true

# 可用的 procedure 列表
apoc.procedures.allowlist=*

# 可用的 function 列表
apoc.functions.allowlist=*

# JSON处理
apoc.json.enabled=true

# 图算法
apoc.graph.enabled=true

# 文本处理
apoc.text.enabled=true

# 时间处理
apoc.date.enabled=true

# 生成ID
apoc.uuid.enabled=true

# HTTP调用
apoc.http.enabled=true

# Elasticsearch集成
apoc.es.enabled=true

# MongoDB集成
apoc.mongodb.enabled=true

# Kafka集成
apoc.kafka.enabled=true
